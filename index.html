<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Live Cricket Commentary</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>

        body {

            margin: 0;
            padding: 0;

            background: #0f172a;

            color: white;

            font-family: Arial, sans-serif;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;
        }

        .container {

            width: 90%;
            max-width: 500px;

            background: #1e293b;

            border-radius: 20px;

            padding: 30px;

            text-align: center;

            box-sizing: border-box;

            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {

            margin-top: 0;

            font-size: 28px;
        }

        .live-row {

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 8px;

            margin-bottom: 20px;
        }

        .live-dot {

            width: 10px;

            height: 10px;

            background: red;

            border-radius: 50%;

            animation: blink 1s infinite;
        }

        @keyframes blink {

            0% { opacity: 1; }

            50% { opacity: 0.3; }

            100% { opacity: 1; }
        }

        .status {

            color: #cbd5e1;

            font-size: 14px;

            margin-bottom: 20px;
        }

        audio {

            width: 100%;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="live-row">

            <div class="live-dot"></div>

            <h1>Live Cricket Commentary</h1>

        </div>

        <div
            class="status"
            id="status"
        >
            Connecting to stream...
        </div>

        <audio
            id="audio"
            controls
            autoplay
        ></audio>

    </div>

    <script>

        // =========================================
        // YOUR LIVE STREAM URL
        // =========================================

        const streamUrl =
            "https://pub-3ce7b3bcc5e844aa9da0768b47c5b711.r2.dev/live/stream.m3u8";

        const audio =
            document.getElementById("audio");

        const status =
            document.getElementById("status");

        // =========================================
        // HLS.js Playback
        // =========================================

        if (Hls.isSupported()) {

            const hls = new Hls({

                // ===============================
                // IMPORTANT BUFFER SETTINGS
                // ===============================

                liveSyncDuration: 20,

                liveMaxLatencyDuration: 40,

                maxBufferLength: 60,

                maxMaxBufferLength: 120,

                backBufferLength: 120,

                lowLatencyMode: false,

                startPosition: -20
            });

            hls.loadSource(streamUrl);

            hls.attachMedia(audio);

            // ===============================
            // Playlist loaded
            // ===============================

            hls.on(
                Hls.Events.MANIFEST_PARSED,
                function () {

                    status.innerText =
                        "Live commentary connected";

                    audio.play();
                }
            );

            // ===============================
            // Error handling
            // ===============================

            hls.on(
                Hls.Events.ERROR,
                function (event, data) {

                    console.log(data);

                    if (data.fatal) {

                        switch (data.type) {

                            case Hls.ErrorTypes.NETWORK_ERROR:

                                status.innerText =
                                    "Reconnecting stream...";

                                hls.startLoad();

                                break;

                            case Hls.ErrorTypes.MEDIA_ERROR:

                                status.innerText =
                                    "Recovering audio...";

                                hls.recoverMediaError();

                                break;

                            default:

                                status.innerText =
                                    "Stream disconnected";

                                hls.destroy();

                                break;
                        }
                    }
                }
            );
        }

        // =========================================
        // Safari Native HLS Support
        // =========================================

        else if (
            audio.canPlayType(
                'application/vnd.apple.mpegurl'
            )
        ) {

            audio.src = streamUrl;

            audio.addEventListener(
                'loadedmetadata',
                function () {

                    audio.play();
                }
            );
        }

    </script>

</body>

</html>
